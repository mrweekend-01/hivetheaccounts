name: Build and publish Docker images

# Se dispara solo con push a main. Álvaro desarrolla y hace push; esto
# construye las imágenes y las publica en GitHub Container Registry (ghcr.io).
# La PC de Roberto nunca ve el código: solo descarga las imágenes ya listas.
on:
  push:
    branches: [main]
  workflow_dispatch:  # permite dispararlo a mano desde la pestaña Actions

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }}  # ej. tuusuario/hack-the-accounts

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # necesario para publicar en ghcr.io

    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Iniciar sesión en ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar imagen (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.name }}:${{ github.sha }}
