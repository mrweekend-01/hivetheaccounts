server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta que no sea un archivo real cae a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # el config.js con la URL del backend nunca se cachea (se genera al arrancar)
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
